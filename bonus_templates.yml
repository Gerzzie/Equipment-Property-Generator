  bAddEff:               "Inflict ARG on target V% chance for ARG4 ms (ARG3 trigger)."
  bAddEffWhenHit:        "Inflict ARG on attacker V% chance for ARG4 ms (ARG3 trigger)."
  bAddEffOnSkill:        "V% chance to inflict ARG2 on target when using ARG (ARG4 trigger)."
  bAutoSpell:            "Adds a V/10% chance to cast ARG Lv ARG2 on attack (ARG4 flags)."
  bAutoSpellWhenHit:     "Adds a V/10% chance to cast ARG Lv ARG2 when hit (ARG4 flags)."
  bAutoSpellOnSkill:     "Adds a V/10% chance to autospell ARG2 Lv ARG3 when using ARG."

# ── bonus5 (5-arg bonuses) ──────────────────────────────────
bonus5:
  bAddEffOnSkill:        "V% chance to inflict ARG2 on target for V5 ms when using ARG (ARG4 trigger)."
  bAutoSpell:            "Adds a V/10% chance to cast ARG Lv ARG2 on attack (ARG4 trigger, ARG5 flags)."
  bAutoSpellWhenHit:     "Adds a V/10% chance to cast ARG Lv ARG2 when hit (ARG4 trigger, ARG5 flags)."
  bAutoSpellOnSkill:     "Adds a V/10% chance to autospell ARG2 Lv ARG3 when using ARG (V5 flags)."

