  bStr:            "STR + V"
  bAgi:            "AGI + V"
  bVit:            "VIT + V"
  bInt:            "INT + V"
  bDex:            "DEX + V"
  bLuk:            "LUK + V"
  bAllStats:       "All Stats + V"
  bAgiVit:         "AGI & VIT + V"
  bAgiDexStr:      "STR, AGI & DEX + V"

  # ── Trait stats ──────────────────────────────────────────
  bPow:            "POW + V"
  bSta:            "STA + V"
  bWis:            "WIS + V"
  bSpl:            "SPL + V"
  bCon:            "CON + V"
  bCrt:            "CRT + V"
